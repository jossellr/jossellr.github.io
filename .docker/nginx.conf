server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Sin caché para desarrollo (al recargar siempre coge la última versión)
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires 0;

    # Bloquea acceso a archivos ocultos (.git, .claude, .docker, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Tipos MIME extra
    types {
        image/svg+xml svg;
    }

    error_page 404 /index.html;
}
